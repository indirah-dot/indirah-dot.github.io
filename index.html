<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    /* Reset and Center */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #ffffff;
      font-family: 'Courier New', Courier, monospace;
    }

    /* The Link "Button" */
    .archive-link {
      text-decoration: none;
      color: #000;
      font-size: 1.1rem;
      text-align: center;
      padding: 20px;
      border: 1px solid transparent;
      transition: all 0.2s ease;
      /* Prevents long text from breaking layout on small screens */
      max-width: 90vw;
      line-height: 1.5;
    }

    /* Hover/Active states for better feedback */
    .archive-link:hover {
      opacity: 0.5;
    }

    .archive-link:active {
      background-color: #f0f0f0;
    }
  </style>
</head>
