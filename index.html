<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>indirah-dot.github.io</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            color: #222;
            background-color: #fafafa;
        }
        header { border-bottom: 1px solid #ddd; margin-bottom: 30px; padding-bottom: 10px; }
        section { margin-bottom: 40px; }
        
        figure { margin: 20px 0; padding: 0; }
        img { 
            max-width: 100%; 
            height: auto; 
            display: block; 
            border-radius: 2px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        }
        figcaption { 
            font-size: 0.85rem; 
            color: #555; 
            margin-top: 12px; 
            font-family: Georgia, serif;
        }

        a { color: #0066cc; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .system-protocol { font-family: ui-monospace, monospace; font-size: 0.8rem; background: #eee; padding: 15px; border-radius: 4px; }
    </style>
</head>
<body>

    <header>
        <h1>Archive & Logs</h1>
    </header>

    <section>
        <figure>
            <img src="IMG_6177.jpeg" alt="Solomonic vinyl record pressing">
            <figcaption>
                <strong>Artifact:</strong> Solomonic Pressing — Recorded March 2026.
            </figcaption>
        </figure>
    </section>

    <section>
        <h2>Documentation</h2>
        <ul>
            <li>
                <a href="https://medium.com/@your-profile/moms-networking-notes-1969" target="_blank" rel="noopener">
                    Mom’s Networking Notes (1969)
                </a>
            </li>
        </ul>
    </section>

    <section class="system-protocol">
        <strong>System Protocol</strong>
        <p>Static archive. Zero-JS. Permanent record status: Active.</p>
    </section>

</body>
</html>
