<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign</title>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace; /* Keeping that system/source look */
            text-transform: uppercase;
            letter-spacing: 0.5em;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: normal;
        }

        /* The Ghost Link */
        .ghost {
            position: fixed;
            bottom: 20px;
            color: #eeeeee; /* Nearly invisible against white */
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.5s ease;
        }

        .ghost:hover {
            color: #888888; /* Becomes visible on hover */
        }
    </style>
</head>
<body>

    <h1>Sovereign</h1>

    <a href="https://medium.com/@indirah/moms-networking-notes-1969" class="ghost">.</a>

</body>
</html>
