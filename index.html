<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mom’s Networking Notes (1969)</title>
  <meta name="author" content="Andy & Gemini">
  
  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: grid;
      place-items: center;
      background: #fff;
      font: 0.9rem 'Courier New', monospace;
      color: #000;
      text-align: center;
    }

    a {
      color: inherit;
      text-decoration: none;
      padding: 20px;
      transition: opacity 0.3s;
    }

    a:hover { opacity: 0.4; }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.7rem;
      opacity: 0.3;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <a id="main-link" href="https://medium.com/@indirah/moms-networking-notes-1969-7b832122793a">
    Mom’s Networking Notes (1969)
  </a>

  <footer>
    Andy & Gemini &copy; 2026
  </footer>

  <script>
    /* Minimalist QA Test Suite */
    (function runTests() {
      const tests = {
        "Link points to Medium": () => document.getElementById('main-link').href.includes('medium.com'),
        "Favicon is linked": () => !!document.querySelector('link[rel="icon"]'),
        "Author meta exists": () => document.querySelector('meta[name="author"]').content === "Andy & Gemini",
        "Title is correct": () => document.title === "Mom’s Networking Notes (1969)"
      };

      console.group("🚀 Page Validation Report");
      Object.entries(tests).forEach(([name, test]) => {
        const passed = test();
        console.log(`${passed ? '✅' : '❌'} ${name}`);
      });
      console.groupEnd();
    })();
  </script>

</body>
</html>
